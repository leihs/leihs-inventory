<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Centered List</title>
  <style>
    ul {
      list-style-type: none; /* Removes bullet points */
      padding: 0; /* Removes default padding */
      margin: 0; /* Removes default margin */
    }
    body {
      display: flex;
      justify-content: center; /* Centers horizontally */
      align-items: center; /* Centers vertically */
      height: 100vh; /* Full height of the viewport */
      margin: 0;
      font-family: Arial, sans-serif;
    }
    .container {
      text-align: center; /* Centers text inside the container */
      list-style-type: none !important; /* Removes default list styling */
      padding: 0;
      margin: 0;
    }
    .container h1 {
      margin-bottom: 20px; /* Adds space below the heading */
    }
    .container a {
      display: block; /* Makes each link appear as a block element */
      margin: 10px 0; /* Adds space between links */
      text-decoration: none; /* Removes underline from links */
      color: #007BFF; /* Sets link color */
    }
    .container a:hover {
      text-decoration: underline; /* Underlines link on hover */
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f9;
      color: #333;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    h1 {
      font-size: 24px;
      font-weight: normal;
      line-height: 1.5;
      text-align: center;
    }

    b {
      font-weight: bold;
      color: #d23669;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>INFO: Use Swagger-API-Endpoints for login / logout</h1>
  <ul>
    <li><a href="/inventory/api-docs/">Swagger-UI [ /inventory/login & /inventory/logout ]</a></li>
    <li><a href="/inventory/">Lehs Inventory [ /inventory ]</a></li>
  </ul>
</div>
<div id="app"></div>
</body>
</html>
