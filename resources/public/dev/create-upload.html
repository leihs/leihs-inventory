<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Form Example - Track Status</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        #spinner {
            display: none;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin-left: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .file-status {
            font-family: monospace;
            font-size: 0.9em;
        }

        .success { color: green; }
        .error { color: red; }
    </style>

    <style>
        .limited-text {
            width: 200px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
        }

        .links {
            padding: 0.5em 1em 1em 1em;
            margin-top: 1em;
            background-color: #f4f4f4;
            border-style: dashed;
        }

        body {
            font-family: Arial, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
        }

        input[type="text"], input[type="file"], textarea, select {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }

        button {
            padding: 10px 15px;
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        .myBtn {
            margin-top: 10px;
        }

        .btn-danger, .remove-file-btn, .deleteStyle {
            background-color: #dc3545;
        }

        .entitlement-row {
            display: flex;
            align-items: center;
            column-gap: 3rem;
            justify-content: space-around;
            margin-top: 0.5rem;
        }

        button:hover {
            background-color: #0056b3;
        }

        .dynamic-list {
            margin-top: 10px;
        }

        .dynamic-item {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .remove-btn {
            background-color: #dc3545;
        }

        .file-list {
            margin-top: 10px;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        body.save-success {
            border: 1em solid #b8f4b8;
            transition: border 0.3s ease-in-out;
        }

        body.no-result-success {
            border: 1em solid #BFBFBF1C;
            transition: border 0.3s ease-in-out;
        }

        body.save-failed {
            border: 1em solid red;
            transition: border 0.3s ease-in-out;
        }

        #addAccessory, #addProperty {
            background-color: #dedede;
            color: black;
        }

        .image-group {
            display: flex;
            gap: 10px;
            justify-content: space-between;
        }

        .image-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 30%; /* Adjust as needed */
        }

        .image-container img {
            width: 100%;
            object-fit: cover;
        }

        .image-footer {
            text-align: center;
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>
<h1>Upload Model & Images (Enhanced)</h1>

<form id="myForm">
    <label for="poolId">Pool-ID:</label>
    <input type="text" id="poolId" name="poolId" required value="8bd16d45-056d-5590-bc7f-12849f034351" />

    <br /><br />

    <label for="product">Product:</label>
    <input type="text" id="product" name="product" required />

    <br /><br />

    <label for="version">Version:</label>
    <input type="text" id="version" name="version"  />

    <br /><br />

    <label for="images">Images:</label>
    <input type="file" id="images" name="images" multiple />

    <br /><br />

    <label for="files">Files:</label>
    <input type="file" id="files" name="files" multiple />

    <br /><br />

    <button type="submit">Submit</button>
    <div id="spinner"></div>
</form>

<div id="status" style="margin-top: 1em; font-weight: bold;"></div>
<div id="fileStatuses" class="file-status"></div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const form = document.getElementById('myForm');
        const statusEl = document.getElementById('status');
        const fileStatuses = document.getElementById('fileStatuses');
        const spinner = document.getElementById('spinner');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            spinner.style.display = 'inline-block';
            statusEl.textContent = '';
            fileStatuses.innerHTML = '';
            form.querySelector('button').disabled = true;

            try {
                const poolId  = document.getElementById('poolId').value.trim();
                const product = document.getElementById('product').value.trim();
                const version = document.getElementById('version').value.trim();
                const images = document.getElementById('images').files;
                const files  = document.getElementById('files').files;

                const modelResponse = await fetch(`/inventory/${poolId}/model/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ product, version })
                });

                if (!modelResponse.ok) throw new Error('Error creating model');

                const modelData = await modelResponse.json();
                const modelId = modelData.data.id;

                statusEl.textContent = `Model created (ID = ${modelId}). Uploading files...`;

                const allFiles = [
                    ...Array.from(images).map(file => ({ file, type: 'image' })),
                    ...Array.from(files).map(file => ({ file, type: 'file' }))
                ];

                const uploadedFilesData = [];
                const uploadStatus = {
                    successfully_uploaded: [],
                    upload_failed: []
                };

                for (let i = 0; i < allFiles.length; i++) {
                    const { file, type } = allFiles[i];
                    const uploadUrl = `/inventory/models/${modelId}/${type === 'image' ? 'images' : 'attachments'}`;
                    const indexText = `${i + 1} of ${allFiles.length}`;

                    fileStatuses.innerHTML += `<div id="file-${i}">🔄 Uploading ${file.name} (${indexText})...</div>`;

                    try {
                        const response = await uploadSingleFile(file, uploadUrl);
                        uploadedFilesData.push(response[0]);
                        document.getElementById(`file-${i}`).innerHTML = `✅ <span class="success">${file.name} uploaded successfully.</span>`;
                        uploadStatus.successfully_uploaded.push({ file_name: file.name });
                    } catch (err) {
                        document.getElementById(`file-${i}`).innerHTML = `❌ <span class="error">${file.name} failed to upload.</span>`;
                        uploadStatus.upload_failed.push({ file_name: file.name });
                    }
                }

                statusEl.textContent = 'Sending final PATCH...';

                const patchBody = {
                    model_id: modelId,
                    uploaded_files: uploadedFilesData
                };

                const patchResponse = await fetch(`/inventory/${poolId}/model`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(patchBody)
                });

                if (!patchResponse.ok) throw new Error('PATCH request failed');

                const patchData = await patchResponse.json();
                statusEl.innerHTML = `
                    ✅ All steps completed.<br>
                    Uploaded: ${uploadStatus.successfully_uploaded.length}<br>
                    Failed: ${uploadStatus.upload_failed.length}
                `;

                console.log('Final PATCH response:', patchData);

            } catch (error) {
                console.error('Error:', error);
                statusEl.textContent = `❌ Error: ${error.message}`;
            } finally {
                spinner.style.display = 'none';
                form.querySelector('button').disabled = false;
            }
        });

        function uploadSingleFile(file, uploadUrl) {

            // debugger

            return new Promise((resolve, reject) => {
                $.ajax({
                    url: uploadUrl,
                    type: 'POST',
                    data: file,
                    contentType: file.type,
                    processData: false,
                    dataType: 'json',
                    headers: { 'Accept': 'application/json',
                        'X-Filename': file.name

                    },
                    success: function(response) {
                        resolve(response);
                    },
                    error: function(_, __, errorThrown) {
                        reject(errorThrown);
                    }
                });
            });
        }
    });
</script>
</body>
</html>
