<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Form Example - Track Status</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
<h1>Upload Model & Images (No FormData, With Status)</h1>

<form id="myForm">
    <label for="poolId">Pool-ID:</label>
    <input type="text" id="poolId" name="poolId" required value="8bd16d45-056d-5590-bc7f-12849f034351" />

    <br /><br />

    <label for="product">Product:</label>
    <input type="text" id="product" name="product" required />

    <br /><br />

    <label for="version">Version:</label>
    <input type="text" id="version" name="version"  />

    <br /><br />

    <label for="images">Images:</label>
    <input type="file" id="images" name="images" multiple />

    <br /><br />

    <button type="submit">Submit</button>
</form>

<!-- Simple status area -->
<div id="status" style="margin-top: 1em; font-weight: bold;"></div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const form = document.getElementById('myForm');
        const statusEl = document.getElementById('status');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            statusEl.textContent = '';

            try {
                // 1) POST the model data
                statusEl.textContent = 'Creating model...';
                const poolId  = document.getElementById('poolId').value.trim();
                const product = document.getElementById('product').value.trim();
                const version = document.getElementById('version').value.trim();

                const modelResponse = await fetch(`/inventory/${poolId}/model/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ product, version })
                });
                if (!modelResponse.ok) {
                    throw new Error('Error creating model data');
                }
                const modelData = await modelResponse.json();
                const modelId = modelData.data.id;  // adapt to your API response

                console.log('Model created, modelId:', modelId);

                // 2) Upload files individually (raw binary) - but wait for each upload
                const files = document.getElementById('images').files;
                const uploadedFilesData = [];

                if (files.length === 0) {
                    console.info('No files selected for UPLOAD');
                    statusEl.textContent = `MODEL CREATED. No files selected for UPLOAD`;
                    return;
                }

                statusEl.textContent = `Model created (ID = ${modelId}). Now uploading files...`;

                // Helper to upload one file as a Promise
                function uploadSingleFile(file, index, total) {
                    return new Promise((resolve, reject) => {
                        statusEl.textContent = `Uploading file ${index + 1} of ${total}...`;

                        const uploadUrl = `/inventory/models/${modelId}/images`;

                        $.ajax({
                            url: uploadUrl,
                            type: 'POST',
                            // The raw binary file as the request body
                            data: file,
                            // Use the actual file type (e.g., "image/png")
                            contentType: file.type,
                            processData: false,
                            dataType: 'json',         // expect JSON response
                            headers: {
                                'Accept': 'application/json'
                            },
                            success: function(response) {
                                console.log('File uploaded successfully:', file.name);

                                // Suppose your server returns an array in the response
                                // (like [ { ...imageData... } ])
                                // We'll store the first element for patch usage
                                const imageData = response[0];
                                resolve(imageData);
                            },
                            error: function(jqXHR, textStatus, errorThrown) {
                                console.error('Error uploading file:', file.name, textStatus, errorThrown);
                                reject(errorThrown);
                            }
                        });
                    });
                }

                // Upload all files in sequence or in parallel
                // To keep it simple, do it in sequence:
                for (let i = 0; i < files.length; i++) {
                    const imgData = await uploadSingleFile(files[i], i, files.length);
                    uploadedFilesData.push(imgData);
                }

                // 3) PATCH to update model with file data
                statusEl.textContent = 'Sending final patch...';

                // FIXME was here: now we actually have the imageData from each file
                // stored in uploadedFilesData.
                const patchBody = {
                    model_id: modelId,
                    uploaded_files: uploadedFilesData
                };

                const patchResponse = await fetch(`/inventory/${poolId}/model`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(patchBody)
                });
                if (!patchResponse.ok) {
                    throw new Error('Error updating model data');
                }
                const patchData = await patchResponse.json();

                // Success
                statusEl.textContent = 'All steps completed successfully!';
                console.log('Final PATCH response:', patchData);

            } catch (error) {
                console.error('Error:', error);
                statusEl.textContent = `An error occurred: ${error.message}`;
            }
        });
    });
</script>
</body>
</html>
