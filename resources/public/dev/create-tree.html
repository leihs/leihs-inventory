<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Expandable Model-Item Table</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
        }

        th {
            background-color: #f4f4f4;
        }

        .expand-btn {
            cursor: pointer;
            color: #007bff;
            text-decoration: underline;
        }

        .child-row {
            background-color: #f9f9f9;
        }

        .Package {
            background-color: #f9f9f9;
        }
        .PackageItem {
            background-color: #eaeaea;
        }
        .Item {
            background-color: #d7d7d7;
        }



    </style>
</head>
<body>

<h2>Model List</h2>
<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Children</th>
    </tr>
    </thead>
    <tbody id="model-body">
    <!-- Rows will be populated via AJAX -->
    </tbody>
</table>

<script>
    $(document).ready(function() {
        // Fetch initial model data
        $.ajax({
            url: '/inventory/8bd16d45-056d-5590-bc7f-12849f034351/models',
            method: 'GET',
            headers: {
                'Accept': 'application/json'
            },
            success: function(models) {
                models.forEach(function(model) {
                    // const hasChildren = model.children.length > 0;

                    const canDelete = ["Item", "Model", "Package"].includes(model.entry_type);
                    const hasChildren = (model.children?.length ?? 0) > 0;

                    const row = $(`
                      <tr data-model-id="${model.id}" class="${model.entry_type}">
                        <td>${model.id}</td>
                        <td>${model.product}</td>
                        <td>${model.is_package}</td>
                        <td>${model.real_type}</td>
                        <td>${model.children}</td>
                        <td>
                          ${hasChildren
                                            ? `<span class="expand-btn">0Expand (${model.children.length})</span>`
                                            : (canDelete ? `<button class="delete-btn">Delete ${model.entry_type}</button>` : '')}
                        </td>
                      </tr>`
                                        );



                    row.data("raw", model)



                        // <td>${model.type}</td>
                        // <td>${model.children.empty()}</td>
                    $('#model-body').append(row);
                });
            }
        });

        // Expand/collapse child items
        $('#model-body').on('click', '.expand-btn', function() {
            const btn = $(this);
            const parentRow = btn.closest('tr');
            const modelId = parentRow.data('model-id');
            const model = parentRow.data('raw');

            // const is_item =!model.entry_type.includes("Item")
            var isRealItemResponse=false;
            if (model.entry_type.includes("Item")) {
            // if (is_item) {
                // debugger
                url =  `/inventory/8bd16d45-056d-5590-bc7f-12849f034351/models/${model.model_id}/items/${model.id}?entry_type=${model.entry_type}`
                isRealItemResponse=true;
            }else{
                url =  `/inventory/8bd16d45-056d-5590-bc7f-12849f034351/models/${modelId}/items?entry_type=${model.entry_type}`

            }

            // debugger

            if (btn.data('expanded')) {
                // Collapse
                $(`.child-of-${modelId}`).remove();
                btn.text(btn.text().replace('Collapse', 'Expand'));
                btn.data('expanded', false);
            } else {
                // Expand
                $.ajax({
                    // url: `/inventory/8bd16d45-056d-5590-bc7f-12849f034351/models/${modelId}/items?entry_type=${model.entry_type}`,
                    url: url,
                    // url: `/inventory/8bd16d45-056d-5590-bc7f-12849f034351/items?model_id=${modelId}`,
                    // url: `/inventory/models/${modelId}/items`,
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json'
                    },
                    success: function(items) {
                        items.forEach(function(item) {
                            const hasChildren = (item.children?.length ?? 0) > 0;
// <!--                                <td></td>-->


                            // Helper function:
                            const expandBtnOrEmpty = (item) => {
                                const hasChildren = Array.isArray(item.children) && item.children.length > 0;
                                return hasChildren
                                    ? `<span class="expand-btn">Expand (${item.children.length})</span>`
                                    : '';
                            };


                            var childRow;
                            const expandBtn = hasChildren
                                ? `<span class="expand-btn">Expand (${item.children.length})</span>`
                                : '';

                            if (isRealItemResponse) {
                                childRow = $(`
                                <tr class="child-row child-of-${modelId} ${item.entry_type}">
                                  <td>${item.id}</td>
                                  <td>${item.inventory_code ?? ''}</td>
                                  <td>${item.inventory_pool_id ?? ''}</td>
                                  <td>${item.model_id ?? ''}</td>
                                  <td>${item.product ?? ''}</td>
                                  <td>${expandBtnOrEmpty(item, '1')}</td>
                                  <td></td>
                                </tr>
                              `);
                                                        } else {
                                                            childRow = $(`
                                <tr class="child-row child-of-${modelId} ${item.entry_type}">
                                  <td>${item.id}</td>
                                  <td>${item.name ?? ''}</td>
                                  <td>${item.product ?? ''}</td>
                                  <td>${item.real_type ?? ''}</td>
                                  <td>${item.description ?? ''}</td>
                                  <td>
                                    ${hasChildren ? `<span class="expand-btn">Expand (${item.children.length})</span>` : ''}
                                  </td>
                                  <td></td>
                                </tr>
                              `);
                                                        }

                            // if(model.product == "Intercom-Case ALTAiR"){
                            //     debugger
                            // }

                            childRow.data("raw", item)


                            parentRow.after(childRow);
                        });
                        btn.text(btn.text().replace('Expand', 'Collapse'));
                        btn.data('expanded', true);
                    }
                });

            }
        });
    });
</script>

</body>
</html>
